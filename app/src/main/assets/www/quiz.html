<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Quiz - Your Dictionary</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body><script>document.body.className=localStorage.getItem('yd_theme')||'light';</script>
<div class="page-bar">
  <button class="page-back" onclick="location.href='index.html'">←</button>
  <span class="page-ttl">🎯 Word Quiz</span>
</div>
<div class="page-wrap"><div id="qBox"><div class="center-spin" style="padding:60px"><div class="spin dark"></div></div></div></div>
<nav class="bottom-nav">
  <a class="bn" href="index.html"><svg viewBox="0 0 24 24" fill="currentColor" width="22"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg><span>Home</span></a>
  <a class="bn" href="translate.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10z"/></svg><span>Translate</span></a>
  <a class="bn" href="favorites.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg><span>Favorites</span></a>
  <a class="bn active" href="quiz.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg><span>Quiz</span></a>
  <a class="bn" href="about.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg><span>About</span></a>
</nav>
<script>
const wds=['ephemeral','serendipity','melancholy','resilience','eloquence','luminous','tenacious','labyrinth','solitude','whimsical','ambiguous','profound','jubilant','zenith','cascade','obsolete','pragmatic','versatile','diligent','candid'];
let qs=[],cur=0,score=0;
const sh=a=>a.sort(()=>Math.random()-.5);
async function start(){
  qs=[];cur=0;score=0;
  document.getElementById('qBox').innerHTML='<div class="center-spin" style="padding:60px"><div class="spin dark"></div></div>';
  for(const w of sh([...wds]).slice(0,5)){
    try{const r=await fetch(`https://api.dictionaryapi.dev/api/v2/entries/en/${w}`);const d=await r.json();qs.push({word:w,def:d[0].meanings[0].definitions[0].definition});}catch(e){}
  }
  if(qs.length<2){document.getElementById('qBox').innerHTML='<div class="err-box"><div class="ico">📡</div><h3>No internet</h3><p>Connect to internet to play.</p><button class="btn-grad" onclick="start()" style="max-width:200px">Retry</button></div>';return;}
  showQ();
}
function showQ(){
  if(cur>=qs.length){showRes();return;}
  const q=qs[cur];
  const opts=sh([q.word,...sh(wds.filter(w=>w!==q.word)).slice(0,3)]);
  const pct=Math.round(cur/qs.length*100);
  document.getElementById('qBox').innerHTML=`
    <div class="quiz-hdr">
      <div class="quiz-meta"><span class="quiz-n">Question ${cur+1} / ${qs.length}</span><span class="quiz-s">Score: ${score}</span></div>
      <div class="pbar"><div class="pbar-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="card"><div class="q-def">${q.def}</div></div>
    <div class="q-opts">${opts.map(o=>`<button class="q-opt" onclick="check('${o}','${q.word}',this)">${o}</button>`).join('')}</div>`;
}
function check(sel,correct,btn){
  document.querySelectorAll('.q-opt').forEach(b=>b.style.pointerEvents='none');
  if(sel===correct){score++;btn.classList.add('ok');}
  else{btn.classList.add('no');document.querySelectorAll('.q-opt').forEach(b=>{if(b.textContent===correct)b.classList.add('ok');});}
  setTimeout(()=>{cur++;showQ();},900);
}
function showRes(){
  const pct=Math.round(score/qs.length*100);
  document.getElementById('qBox').innerHTML=`<div class="card" style="text-align:center;padding:32px"><div style="font-size:60px;margin-bottom:12px">${pct>=80?'🏆':pct>=60?'👍':'📚'}</div><div style="font-size:22px;font-weight:900;margin-bottom:8px">Quiz Complete!</div><div style="font-size:16px;color:var(--text2);margin-bottom:24px">Score: <strong style="color:var(--primary)">${score}/${qs.length}</strong></div><button class="btn-grad" onclick="start()">Play Again</button></div>`;
}
start();
</script>
</body></html>
