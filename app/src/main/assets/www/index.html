<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Your Dictionary</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Lora:ital@0;1&display=swap" rel="stylesheet">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <div class="logo" onclick="location.href='index.html'">
      <div class="logo-icon-wrap">
        <svg viewBox="0 0 32 32" fill="none" width="28" height="28">
          <rect width="32" height="32" rx="8" fill="#1a3a8f"/>
          <path d="M8 22 L16 8 L24 22" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
          <path d="M10.5 17 L21.5 17" stroke="white" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </div>
      <span class="logo-text">YourDict</span>
    </div>
    <button class="menu-btn" id="menuBtn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
  </div>
</header>

<div class="mobile-nav" id="mobileNav">
  <a href="index.html" class="mnav-item active">🏠 Home</a>
  <a href="translate.html" class="mnav-item">🌐 Translate</a>
  <a href="favorites.html" class="mnav-item">❤️ Favorites</a>
  <a href="quiz.html" class="mnav-item">🎯 Quiz</a>
  <a href="about.html" class="mnav-item">ℹ️ About</a>
</div>

<div class="search-hero">
  <div class="search-hero-inner">
    <h1>Find any word,<br><span class="grad">instantly</span></h1>
    <p>Definitions · Synonyms · Examples · Audio</p>
    <div class="search-wrap">
      <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="22" y2="22"/></svg>
      <input type="text" id="heroInput" placeholder="Search a word..." autocomplete="off" spellcheck="false">
      <button class="s-btn" id="heroBtn">Go</button>
    </div>
    <div class="suggestions" id="suggestions"></div>
  </div>
</div>

<div class="results-section" id="resultsSection" style="display:none">
  <div class="page-wrap" id="resultsContent"></div>
</div>

<div id="homeContent">
  <div class="page-wrap">
    <div class="wod-section">
      <div class="sec-label">✦ Word of the Day</div>
      <div class="wod-card" id="wodCard"><div class="loading"><div class="spinner"></div></div></div>
    </div>

    <div class="sec-label">✦ Browse by Category</div>
    <div class="cat-grid">
      <div class="cat-card" data-word="ephemeral"><div class="cat-icon">📚</div><div class="cat-name">Literature</div></div>
      <div class="cat-card" data-word="hypothesis"><div class="cat-icon">🔬</div><div class="cat-name">Science</div></div>
      <div class="cat-card" data-word="algorithm"><div class="cat-icon">💻</div><div class="cat-name">Tech</div></div>
      <div class="cat-card" data-word="serendipity"><div class="cat-icon">✨</div><div class="cat-name">Beautiful</div></div>
      <div class="cat-card" data-word="democracy"><div class="cat-icon">🏛️</div><div class="cat-name">Politics</div></div>
      <div class="cat-card" data-word="melancholy"><div class="cat-icon">🎭</div><div class="cat-name">Emotions</div></div>
    </div>

    <div id="recentSection" style="display:none">
      <div class="sec-label">✦ Recent Searches</div>
      <div class="recent-list" id="recentList"></div>
    </div>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="bnav active">🏠<span>Home</span></a>
  <a href="translate.html" class="bnav">🌐<span>Translate</span></a>
  <a href="favorites.html" class="bnav">❤️<span>Favorites</span></a>
  <a href="quiz.html" class="bnav">🎯<span>Quiz</span></a>
  <a href="about.html" class="bnav">ℹ️<span>About</span></a>
</nav>

<script src="app.js"></script>
</body>
</html>
