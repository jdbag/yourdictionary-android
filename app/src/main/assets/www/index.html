<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Your Dictionary</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body class="dark">

<!-- TOP -->
<div class="top-bar">
  <span class="app-title">Your Dictionary</span>
  <div class="top-actions">
    <button class="icon-btn" onclick="toggleTheme()" id="themeBtn">☀️</button>
  </div>
</div>

<!-- MAIN SEARCH/TRANSLATE BOX -->
<div class="main-card" id="mainCard">
  <div class="lang-row">
    <button class="lang-pill active-lang" id="fromBtn" onclick="openLangPicker('from')">
      <span id="fromFlag">🇬🇧</span>
      <span id="fromName">English</span>
      <span class="arrow">▾</span>
    </button>
    <button class="swap-circle" onclick="swapLangs()">⇄</button>
    <button class="lang-pill" id="toBtn" onclick="openLangPicker('to')">
      <span id="toFlag">🇸🇦</span>
      <span id="toName">Arabic</span>
      <span class="arrow">▾</span>
    </button>
  </div>
  <div class="input-row">
    <input type="text" id="mainInput" placeholder="Enter text..." autocomplete="off" spellcheck="false">
    <button class="mic-btn">🎤</button>
  </div>
  <div class="input-actions">
    <button class="action-link" onclick="doSearch()">🔍 Dictionary</button>
    <button class="action-link" onclick="doTranslate()">🌐 Translate</button>
    <button class="clear-x" id="clearX" onclick="clearMain()" style="display:none">✕</button>
  </div>
</div>

<!-- SUGGESTIONS -->
<div class="sugg-list" id="suggList"></div>

<!-- RESULT AREA -->
<div id="resultArea" style="display:none">
  <div class="result-tabs">
    <button class="rtab active" id="dictTab" onclick="showTab('dict')">Dictionary</button>
    <button class="rtab" id="transTab" onclick="showTab('trans')">Translation</button>
  </div>
  <div id="dictResult"></div>
  <div id="transResult" style="display:none"></div>
</div>

<!-- HOME CONTENT -->
<div id="homeContent">
  <!-- QUICK FEATURES -->
  <div class="features-grid">
    <div class="feat-big" onclick="location.href='favorites.html'">
      <span class="feat-icon">❤️</span>
      <span class="feat-lbl">Favorites</span>
    </div>
    <div class="feat-col">
      <div class="feat-small" onclick="location.href='quiz.html'">
        <span>🎯</span><span>Quiz</span>
      </div>
      <div class="feat-small" onclick="location.href='about.html'">
        <span>ℹ️</span><span>About</span>
      </div>
    </div>
  </div>

  <!-- WORD OF DAY -->
  <div class="section-block">
    <div class="sec-hdr">
      <span class="sec-ttl">📅 Word of the Day</span>
    </div>
    <div class="wod-card" id="wodCard">
      <div class="loading-c"><div class="spin"></div></div>
    </div>
  </div>

  <!-- RECENT -->
  <div class="section-block" id="recentBlock" style="display:none">
    <div class="sec-hdr">
      <span class="sec-ttl">🕐 Recent</span>
      <button class="sec-action" onclick="clearRecent()">Clear</button>
    </div>
    <div class="chip-wrap" id="recentChips"></div>
  </div>

  <!-- CATEGORIES -->
  <div class="section-block">
    <div class="sec-hdr"><span class="sec-ttl">📚 Topics</span></div>
    <div class="cat-grid">
      <div class="cat-tile" onclick="doSearch('ephemeral')"><span>📖</span><b>Literature</b></div>
      <div class="cat-tile" onclick="doSearch('hypothesis')"><span>🔬</span><b>Science</b></div>
      <div class="cat-tile" onclick="doSearch('algorithm')"><span>💻</span><b>Tech</b></div>
      <div class="cat-tile" onclick="doSearch('eloquence')"><span>✨</span><b>Beautiful</b></div>
      <div class="cat-tile" onclick="doSearch('democracy')"><span>🏛️</span><b>Politics</b></div>
      <div class="cat-tile" onclick="doSearch('melancholy')"><span>🎭</span><b>Emotions</b></div>
    </div>
  </div>
</div>

<!-- LANG PICKER MODAL -->
<div class="modal-overlay" id="langModal" onclick="closeLangPicker()" style="display:none">
  <div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-hdr">Select Language</div>
    <div id="langList"></div>
  </div>
</div>

<!-- BOTTOM NAV -->
<nav class="bnav">
  <a class="bni active" href="index.html">
    <svg viewBox="0 0 24 24" fill="currentColor" width="22"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    <span>Home</span>
  </a>
  <a class="bni" href="translate.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10z"/></svg>
    <span>Translate</span>
  </a>
  <a class="bni" href="favorites.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"><path d="M11.049 2.927c.3-.921 1.603-.921 1.902 0l1.519 4.674a1 1 0 0 0 .95.69h4.915c.969 0 1.371 1.24.588 1.81l-3.976 2.888a1 1 0 0 0-.363 1.118l1.518 4.674c.3.922-.755 1.688-1.538 1.118l-3.976-2.888a1 1 0 0 0-1.176 0l-3.976 2.888c-.783.57-1.838-.197-1.538-1.118l1.518-4.674a1 1 0 0 0-.363-1.118l-3.976-2.888c-.784-.57-.38-1.81.588-1.81h4.914a1 1 0 0 0 .951-.69l1.519-4.674z"/></svg>
    <span>Favorites</span>
  </a>
  <a class="bni" href="quiz.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
    <span>Quiz</span>
  </a>
  <a class="bni" href="about.html">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="22"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
    <span>More</span>
  </a>
</nav>

<script src="app.js"></script>
</body>
</html>
