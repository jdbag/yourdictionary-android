<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"><title>Translate - YourDict</title><link rel="stylesheet" href="style.css"><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet"></head>
<body><script>document.body.className=localStorage.getItem('yd_t')||'dark';</script>
<div class="page-bar"><button class="pb-back" onclick="location.href='index.html'">←</button><span class="pb-title">Translate</span></div>
<div class="pw">
  <div class="tl-langs">
    <select id="fl"><option value="en">🇬🇧 English</option><option value="ar">🇸🇦 Arabic</option><option value="fr">🇫🇷 French</option><option value="es">🇪🇸 Spanish</option><option value="de">🇩🇪 German</option><option value="it">🇮🇹 Italian</option><option value="pt">🇧🇷 Portuguese</option><option value="ru">🇷🇺 Russian</option><option value="zh">🇨🇳 Chinese</option><option value="ja">🇯🇵 Japanese</option><option value="ko">🇰🇷 Korean</option><option value="tr">🇹🇷 Turkish</option><option value="hi">🇮🇳 Hindi</option></select>
    <button class="tl-sw" onclick="sw()">⇄</button>
    <select id="tl"><option value="ar">🇸🇦 Arabic</option><option value="en">🇬🇧 English</option><option value="fr">🇫🇷 French</option><option value="es">🇪🇸 Spanish</option><option value="de">🇩🇪 German</option><option value="it">🇮🇹 Italian</option><option value="pt">🇧🇷 Portuguese</option><option value="ru">🇷🇺 Russian</option><option value="zh">🇨🇳 Chinese</option><option value="ja">🇯🇵 Japanese</option><option value="ko">🇰🇷 Korean</option><option value="tr">🇹🇷 Turkish</option><option value="hi">🇮🇳 Hindi</option></select>
  </div>
  <div class="card"><textarea id="inp" placeholder="Enter text..."></textarea><div class="card-foot"><button onclick="document.getElementById('inp').value=''">✕ Clear</button></div></div>
  <button class="btn-grad" onclick="tr()" style="width:100%;margin-bottom:12px;padding:14px;border-radius:50px">Translate</button>
  <div class="card" id="rc" style="display:none"><div class="r-lbl">Translation</div><div class="r-txt" id="rt"></div><div class="r-foot"><button onclick="navigator.clipboard?.writeText(document.getElementById('rt').textContent)">📋 Copy</button><button onclick="document.getElementById('rc').style.display='none'">✕</button></div></div>
</div>

<script>
function sw(){const f=document.getElementById('fl'),t=document.getElementById('tl'),x=f.value;f.value=t.value;t.value=x;}
async function tr(){const text=document.getElementById('inp').value.trim();if(!text)return;const from=document.getElementById('fl').value,to=document.getElementById('tl').value;const rc=document.getElementById('rc'),rt=document.getElementById('rt');rc.style.display='block';rt.textContent='Translating...';try{const r=await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${from}|${to}`);const d=await r.json();rt.textContent=d.responseData.translatedText;}catch{rt.textContent='Translation failed.';}}
</script></body></html>
