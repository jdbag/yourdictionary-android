name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Create launcher icons
        run: |
          sudo apt-get install -y imagemagick -qq
          create_icon() {
            SIZE=$1; DIR=$2
            mkdir -p app/src/main/res/$DIR
            convert -size ${SIZE}x${SIZE} xc:none \
              \( -size ${SIZE}x${SIZE} xc:none -fill '#1a3a8f' \
                 -draw "roundrectangle 0,0,${SIZE},${SIZE},$((SIZE/5)),$((SIZE/5))" \) \
              -composite \
              \( -size ${SIZE}x${SIZE} xc:none -fill none -stroke white -strokewidth $((SIZE/14)) \
                 -draw "polyline $((SIZE*25/100)),$((SIZE*75/100)) $((SIZE*50/100)),$((SIZE*20/100)) $((SIZE*75/100)),$((SIZE*75/100))" \
                 -draw "line $((SIZE*30/100)),$((SIZE*55/100)) $((SIZE*70/100)),$((SIZE*55/100))" \) \
              -composite \
              app/src/main/res/$DIR/ic_launcher.png
            cp app/src/main/res/$DIR/ic_launcher.png app/src/main/res/$DIR/ic_launcher_round.png
          }
          create_icon 36 mipmap-ldpi
          create_icon 48 mipmap-mdpi
          create_icon 72 mipmap-hdpi
          create_icon 96 mipmap-xhdpi
          create_icon 144 mipmap-xxhdpi
          create_icon 192 mipmap-xxxhdpi
          echo "Icons created ✓"

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YourDictionary-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
