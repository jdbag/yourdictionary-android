name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install Gradle 8.4
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /opt/gradle
          echo "/opt/gradle/gradle-8.4/bin" >> $GITHUB_PATH

      - name: Create launcher icons
        run: |
          sudo apt-get install -y imagemagick
          for size in 36 48 72 96 144 192; do
            case $size in
              36) dir="mipmap-ldpi";;
              48) dir="mipmap-mdpi";;
              72) dir="mipmap-hdpi";;
              96) dir="mipmap-xhdpi";;
              144) dir="mipmap-xxhdpi";;
              192) dir="mipmap-xxxhdpi";;
            esac
            mkdir -p app/src/main/res/$dir
            convert -size ${size}x${size} xc:#1a3a8f \
              -fill white -draw "roundrectangle 4,4,$((size-4)),$((size-4)),8,8" \
              app/src/main/res/$dir/ic_launcher.png
            cp app/src/main/res/$dir/ic_launcher.png \
               app/src/main/res/$dir/ic_launcher_round.png
          done

      - name: Build APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: YourDictionary-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
